services:
  app:
    # build:
    #   context: .
    #   dockerfile: Dockerfile-slim
    # 生产环境严禁使用 :latest
    image: fastapi-scaff:v1.0.0

    environment:
      APP_ENV: prod

    volumes:
      # - /data/fastapi-scaff/config:/app/config
      - /data/fastapi-scaff/logs:/app/logs

    # ingress 模式由 Swarm routing mesh 统一对外暴露并负载均衡
    ports:
      - target: 8000
        published: 8000
        protocol: tcp
        mode: ingress

    # 如需 gunicorn，请先 pip install gunicorn 再切换
    command: "uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 5 --log-level info"
    # command: "gunicorn app.main:app -c config/gunicorn.conf.py"

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request;urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    deploy:
      mode: replicated
      replicas: 3

      # 滚动更新：start-first 保证零停机，失败自动回滚
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 60s

      # limits 硬上限，reservations 软预留
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 180s

      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"

    networks:
      - app-network

networks:
  app-network:
    driver: overlay
    attachable: true

# =============================================================================
#  部署步骤
# =============================================================================
#
# 前置条件：确保 Swarm 已初始化
#    1）ADVERTISE_IP的选取（可被其他节点访问的局域网/内网IP）：
#       ip -4 addr show scope global | awk '/inet /{print $2}' | cut -d/ -f1
#    2）初始化
#       docker swarm init --advertise-addr $ADVERTISE_IP
#       docker swarm update --cert-expiry 8760h
#    其他节点加入：docker swarm join-token worker
#
# 1. 准备挂载文件（无则跳过）
#
# 2. 准备镜像（二选一）
#    A) 推送到仓库：
#       docker tag fastapi-scaff:v1.0.0 your-registry/fastapi-scaff:v1.0.0
#       docker push your-registry/fastapi-scaff:v1.0.0
#    B) 本地构建：
#       docker build -t fastapi-scaff:v1.0.0 .
#
# 3. 部署
#    docker stack deploy -c docker-compose.swarm.yaml fastapi-scaff
#
# 4. 验证
#    docker service ls
#    docker service ps fastapi-scaff_app
#    docker service logs fastapi-scaff_app --follow
#
# 5. 访问
#    curl http://localhost:8000/health
#
# 6. 升级（修改 image 后重新执行第 4 步）
#    watch docker service ps fastapi-scaff_app
#
# 7. 清理
#    docker stack rm fastapi-scaff
#
# 文档：https://docs.docker.com/manuals/
